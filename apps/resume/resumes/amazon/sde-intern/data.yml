    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Engineered a Rust-based systems CLI for deterministic, cross-platform dependency resolution and environment reproducibility across macOS, Linux, and Windows.
      - Designed a custom TOML specification with conditional logic and platform-aware build graphs; implemented a dependency resolver producing deterministic, reproducible output at scale.

  - name: "crib."
    url: https://github.com/austindelic/crib
