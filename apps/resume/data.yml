projects:
  - name: "Still"
    url: https://github.com/austindelic/still
    affiliation: Independent / Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Designing and developing a Rust-based universal package manager focused on performance, determinism, and cross-platform support (macOS, Linux, Windows).
      - Combines package management, version management, task running, and environment configuration into a single cohesive CLI tool.
      - Implements TOML-based specifications with support for conditional logic, platform-aware builds, and conversion from existing Homebrew formulae.
      - Prioritises fast execution, small binary size, and a clean developer experience compared to traditional tools like Homebrew and mise.
      - Built with extensibility in mind, enabling future support for TUIs, dotfile management, and interoperability with other package managers.

  - name: "Personal Website"
    url: https://austindelic.com
    affiliation: Independent
    startDate: 2024-06-01
    endDate: Present
    highlights:
      - Designed and built a personal portfolio and writing platform to showcase projects, technical work, and professional experience.
      - Developed with a strong focus on performance, visual polish, and clarity, incorporating dynamic visuals and subtle motion effects.
      - Serves as a central hub for open-source projects, experiments, blog-style posts, and long-form technical writing.
      - Emphasises a clean, modern aesthetic while maintaining fast load times and accessibility across devices.
      - Used as a living portfolio to iterate on design ideas, document learning, and present work to recruiters, collaborators, and startup programs.

  - name: "crib."
    url: https://github.com/austindelic/crib
    affiliation: Independent
    startDate: 2025-04-01
    endDate: Present
    highlights:
      - Designed and built a full-stack personal and shared task management application focused on housemates and small groups.
      - Developed using modern web technologies including Svelte 5 (runes), SvelteKit, PostgreSQL, and real-time data synchronisation.
      - Enables users to manage shared responsibilities, vote on issues, raise concerns, schedule meetings, and track personal tasks alongside group tasks.
      - Emphasises simplicity and usability, positioning the app as a lightweight alternative to complex tools like Notion or ClickUp.
      - Architected with security in mind, including authenticated real-time updates and server-side event relays to protect infrastructure keys.

