  - name: "crib."
    url: https://github.com/austindelic/crib
    affiliation: Open Source
    startDate: 2025-04-01
    endDate: Present
    highlights:
      - Built a full-stack collaborative task manager using Svelte 5 (runes), SvelteKit, and PostgreSQL; designed data schema, API layer, and UI end-to-end, focusing on real-time user interactions and responsive frontend behaviour.
      - Engineered real-time synchronisation across clients using server-sent events, leveraging fine-grained reactivity for a low-latency UI.

  - name: "Still"
    url: https://github.com/austindelic/still
    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Engineered a Rust-based CLI tool targeting deterministic, cross-platform dependency resolution and environment reproducibility across macOS, Linux, and Windows.
