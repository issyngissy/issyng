projects:
  - name: "Embedded Firmware Calculator (ARM Microcontroller)"
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: 2025-06-01
    highlights:
      - Developed embedded bare-metal firmware in C for ARM Cortex-M (RP2350, Raspberry Pi Pico 2).
      - Managed memory and peripheral I/O without OS support; worked under strict embedded resource constraints (memory, timing).
      - Implemented interrupt-driven and timer-based execution.
      - Implemented I2C and SPI drivers at register level.
      - Performed hardware bring-up and peripheral validation.
      - Debugged hardware-software integration issues under real-time constraints.
      - Integrated OLED display via register-level driver control.
      - Re-architected firmware in Rust (no_std embedded environment) for memory safety in embedded systems.

  - name: "Still"
    url: https://github.com/austindelic/still
    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Engineered a Rust-based systems CLI for deterministic dependency resolution across macOS, Linux, and Windows.
      - Designed a custom TOML spec with conditional logic and platform-aware build graphs; implemented a dependency resolver producing reproducible output across host architectures.

  - name: "crib."
    url: https://github.com/austindelic/crib
    affiliation: Open Source
    startDate: 2025-04-01
    endDate: Present
    highlights:
      - Built a real-time collaborative task manager with live synchronisation via server-sent events, backed by SvelteKit and PostgreSQL.

