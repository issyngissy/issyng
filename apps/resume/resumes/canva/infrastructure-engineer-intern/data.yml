    affiliation: Personal Project
    startDate: 2025-06-01
    endDate: Present
    highlights:
      - Provisioned and operated a full-stack AI system for automated document classification in legal discovery, designed to support real-world document workflows for end users; architected service-oriented separation across frontend, API layer, and backend processing services.
      - Developed asynchronous backend workers for high-volume document classification pipelines with concurrent processing.
      - Provisioned and managed cloud infrastructure on AWS using Infrastructure-as-Code (OpenTofu), defining compute, storage, and data processing pipelines for consistent, reproducible deployments.

  - name: "Homelab Infrastructure (Self-Hosted Platform)"
    affiliation: Personal Project
    startDate: 2025-01-01
    endDate: Present
    highlights:
      - Engineered a self-hosted infrastructure stack using Docker-based service orchestration and reverse proxy architecture on local hardware; built and operated systems across both local and cloud environments.
      - Exposed services securely via Cloudflare Tunnel, eliminating public attack surface; managed TLS, networking, and service isolation across multiple containerised services.

  - name: "Still"
    url: https://github.com/austindelic/still
    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Engineered a Rust-based infrastructure CLI for deterministic, cross-platform dependency resolution and environment provisioning across macOS, Linux, and Windows.
      - Designed a custom TOML spec with conditional logic and platform-aware build graphs; implemented a dependency resolver producing reproducible output.

  - name: "Tactify (AI Document Processing System)"
    affiliation: Personal Project
    startDate: 2025-09-01
    endDate: Present
    highlights:
      - Engineered a full-stack system for converting documents into audio and sensory outputs, with a Go backend handling AI processing pipelines leveraging concurrent processing for performance, throughput, and low-latency processing.
      - Designed and implemented typed APIs using Connect-tRPC to interface between frontend and backend services.
      - Built data pipelines for document ingestion, processing, and output transformation with scalable architecture for real-time generation.

  - name: "crib."
