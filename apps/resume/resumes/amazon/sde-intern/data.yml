      - Provisioned and managed cloud infrastructure on AWS using Infrastructure-as-Code (OpenTofu), defining compute, storage, and data processing pipelines for reproducible deployments.

  - name: "Tactify (AI Document Processing System)"
    affiliation: Personal Project
    startDate: 2025-09-01
    endDate: Present
    highlights:
      - Engineered a full-stack system for converting documents into audio and sensory outputs, with a Go backend handling AI processing pipelines optimised for performance, throughput, and low-latency processing.
      - Designed and implemented typed APIs using Connect-tRPC, enforcing contracts between frontend and backend services.
      - Built data ingestion and transformation pipelines for unstructured document workloads with scalable architecture for real-time output generation.

