projects:
  - name: "Still"
    url: https://github.com/austindelic/still
    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Building a Rust-based universal package manager targeting cross-platform deterministic resolution across macOS, Linux, and Windows.
      - Consolidates package management, version pinning, task execution, and environment configuration into a single composable CLI, replacing the fragmented toolchain (Homebrew, mise, Make, direnv).
      - Implements a custom TOML spec with conditional logic, platform-aware build graphs, and first-class Homebrew formula compatibility.

  - name: "crib."
    url: https://github.com/austindelic/crib
    affiliation: Open Source
    startDate: 2025-04-01
    endDate: Present
    highlights:
      - Built a full-stack collaborative task manager for housemates and small groups, designed around shared accountability and real-time updates.
      - Implemented with Svelte 5 (runes), SvelteKit, and PostgreSQL, leveraging fine-grained reactivity and server-sent events for live synchronisation across clients.

