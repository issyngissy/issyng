projects:
  - name: "Still (Cross-Platform Package Manager)"
    url: https://github.com/austindelic/still
    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Building a Rust-based universal package manager targeting deterministic, cross-platform dependency resolution across macOS, Linux, and Windows; maintains a public open source repository with structured issue tracking and contribution workflow.
      - Designed a custom TOML specification with conditional logic and platform-aware build graphs; implemented a dependency resolver with topological sort for reproducible, ordered execution.
      - Built across multiple modules with clean separation of concerns, enabling independent testing and clear boundaries between parsing, resolution, and execution layers.

  - name: "Real-Time Collaborative Task System"
    url: https://github.com/austindelic/crib
    affiliation: Open Source
    startDate: 2025-04-01
    endDate: Present
    highlights:
      - Built a full-stack multi-tiered application using Svelte 5, SvelteKit, and PostgreSQL with server-sent events for real-time state synchronisation across clients.
      - Designed normalised relational schema with referential integrity and concurrent write handling; implemented optimistic concurrency control to prevent data races under simultaneous updates.
      - Shipped with comprehensive unit and integration tests, structured pull request workflow, and clear documentation for contributors.

  - name: "Distributed Document Processing Pipeline"
    affiliation: Personal Project
    startDate: 2025-06-01
    endDate: Present
    highlights:
      - Built a distributed, multi-tiered backend service in Go with concurrent worker goroutines, fault-tolerant task queues, and typed API contracts using Connect-tRPC.
      - Provisioned and managed cloud infrastructure on AWS (EC2, S3, RDS) using OpenTofu; containerised services with Docker for reproducible, environment-consistent deployments.

  - name: "Tactify (Accessible Document AI)"
    affiliation: Personal Project
    startDate: 2025-09-01
    endDate: Present
    highlights:
      - Engineered a high-throughput document transformation pipeline in Go handling unstructured inputs across multiple formats, with asynchronous processing and parallelised I/O-bound stages.
      - Applied systematic profiling and optimisation to reduce end-to-end latency, identifying and fixing bottlenecks across the processing pipeline.

