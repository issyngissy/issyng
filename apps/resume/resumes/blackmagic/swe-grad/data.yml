projects:
  - name: "Still (Cross-Platform Systems CLI)"
    url: https://github.com/austindelic/still
    affiliation: Open Source
    startDate: 2024-12-01
    endDate: Present
    highlights:
      - Engineered a Rust-based systems CLI targeting deterministic, cross-platform dependency resolution across macOS, Linux, and Windows; applies systems programming techniques from C/C++ traditions in a memory-safe language.
      - Designed a custom TOML specification with conditional logic and platform-aware build graphs; implemented a dependency resolver using topological sort for reproducible, ordered execution.
      - Built for correctness in low-level scenarios, with explicit error propagation, no heap allocations in hot paths, and no silent failure modes.

  - name: "Distributed Document Processing Pipeline"
    affiliation: Personal Project
    startDate: 2025-06-01
    endDate: Present
    highlights:
      - Built a distributed, multi-tiered document processing system in Go with concurrent worker goroutines, fault-tolerant task queues, and horizontal scaling across nodes.
      - Provisioned and managed cloud infrastructure on AWS (EC2, S3, RDS) using OpenTofu; containerised services with Docker for reproducible deployments.
      - Designed relational schema in PostgreSQL for high-volume document metadata with optimised indexing and query planning for low-latency reads at scale.

  - name: "Real-Time Collaborative Task System"
    url: https://github.com/austindelic/crib
    affiliation: Open Source
    startDate: 2025-04-01
    endDate: Present
    highlights:
      - Built a full-stack multi-tiered application using Svelte 5, SvelteKit, and PostgreSQL with server-sent events for real-time state synchronisation across distributed clients.
      - Designed normalised relational schema with referential integrity and concurrent write handling; implemented optimistic concurrency control to prevent data races under simultaneous updates.

  - name: "Tactify (Accessible Document AI)"
    affiliation: Personal Project
    startDate: 2025-09-01
    endDate: Present
    highlights:
      - Engineered a high-throughput document transformation pipeline in Go with asynchronous processing, containerised for cloud deployment, and typed API contracts using Connect-tRPC.
      - Applied optimisation techniques to reduce end-to-end latency, batching AI inference calls and parallelising I/O-bound transformation stages.

